# Netlify config. The site lives in web/; everything else (Go template, CI) is
# ignored by the build context.
[build]
  base = "web"
  command = "bun install --frozen-lockfile && bun run build:deploy"
  publish = "dist"

[build.environment]
  # Vite 6 needs Node 18+. Netlify's build image ships bun preinstalled.
  NODE_VERSION = "20"
